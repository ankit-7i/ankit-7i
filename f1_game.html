// ═══════════════════════════════════════════════════
const TW  = 52;  // track half-width
const NSEG = 1000;

// Define track as a series of waypoints then smooth
const RAW_WAYPOINTS = [
  // Start/Finish straight
  {x:  400, y:  600}, {x:  800, y:  600},
  // Turn 1 — right hairpin
  {x:  950, y:  580}, {x: 1050, y:  500}, {x: 1050, y:  350},
  // Back straight
  {x: 1050, y:  200}, {x:  900, y:  120}, {x:  700, y:  100},
  // Complex left section
  {x:  500, y:  100}, {x:  350, y:  150}, {x:  250, y:  250},
  // Tight chicane
  {x:  180, y:  350}, {x:  200, y:  430}, {x:  280, y:  480},
  // Return to start
  {x:  320, y:  550}, {x:  370, y:  590},
];

function catmullRom(p0,p1,p2,p3,t){
  const t2=t*t, t3=t2*t;
  return {
    x: .5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: .5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
  };
}

let TRACK = [], TLEN = 0;

function buildTrack(){
  TRACK = [];
  const W0 = RAW_WAYPOINTS;
  const N  = W0.length;
  const ptsPerSeg = Math.ceil(NSEG / N);

  for(let i = 0; i < N; i++){
    const p0 = W0[(i-1+N)%N], p1 = W0[i], p2 = W0[(i+1)%N], p3 = W0[(i+2)%N];
    for(let j = 0; j < ptsPerSeg; j++){
      TRACK.push(catmullRom(p0, p1, p2, p3, j/ptsPerSeg));
    }
  }

  // Compute arc-lengths & normals
  let acc = 0;
  for(let i = 0; i < TRACK.length; i++){
    const ni = (i+1) % TRACK.length;
    const dx = TRACK[ni].x - TRACK[i].x;
    const dy = TRACK[ni].y - TRACK[i].y;
    const d  = Math.hypot(dx, dy) || 0.001;
    TRACK[i].s   = acc;
    TRACK[i].nx  = dx/d;
    TRACK[i].ny  = dy/d;
    TRACK[i].lx  =  dy/d;  // left normal
    TRACK[i].ly  = -dx/d;
    TRACK[i].ang = Math.atan2(dy, dx);
    acc += d;
  }
  TLEN = acc;
}
buildTrack();

function trackAt(s){
  s = ((s % TLEN) + TLEN) % TLEN;
  let lo = 0, hi = TRACK.length - 1;
  while(lo < hi - 1){ const m = (lo+hi)>>1; if(TRACK[m].s <= s) lo=m; else hi=m; }
  const t0 = TRACK[lo], t1 = TRACK[(lo+1)%TRACK.length];
  const f  = (s - t0.s) / (t1.s - t0.s + 0.0001);
  return {
    x:   t0.x + (t1.x - t0.x)*f,
    y:   t0.y + (t1.y - t0.y)*f,
    nx:  t0.nx, ny: t0.ny,
    lx:  t0.lx, ly: t0.ly,
    ang: t0.ang,
  };
}

// Pre-bake track poly for drawing
let trackPolyL = [], trackPolyR = [];
function bakeTrackPoly(){
  trackPolyL = []; trackPolyR = [];
  for(let i = 0; i < TRACK.length; i++){
    const t = TRACK[i];
    trackPolyL.push({x: t.x + t.lx*TW,  y: t.y + t.ly*TW});
    trackPolyR.push({x: t.x - t.lx*TW,  y: t.y - t.ly*TW});
  }
}
bakeTrackPoly();

const CAM = { x:0, y:0, ang:0, zoom:1.1 };

function updateCam(px, py, pang, dt){
  const bx = px - Math.cos(pang)*200;
  const by = py - Math.sin(pang)*200;
  const lf = 1 - Math.pow(0.018, dt);
  CAM.x += (bx - CAM.x)*lf;
  CAM.y += (by - CAM.y)*lf;
  CAM.ang += (pang - CAM.ang)*lf;
}

function w2s(wx, wy){
  const dx = wx - CAM.x, dy = wy - CAM.y;
  const c = Math.cos(-CAM.ang), s = Math.sin(-CAM.ang);
  const rx =  dx*c - dy*s;
  const ry = (dx*s + dy*c) * 0.55;  // perspective tilt
  return { sx: W/2 + rx*CAM.zoom, sy: H/2 + ry*CAM.zoom - 60 };
}

// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){

let lastMs = performance.now();

function update(now){
  const dt = Math.min((now - lastMs)/16.67, 3); lastMs = now;
  if(!on || paused){ tickPts(dt); return; }
  if(hintTimer>0){ hintTimer-=dt; if(hintTimer<=0) g('kh').classList.add('gone'); }

  // Boost
  if(boost()&&P.boostFuel>0){ P.boost=true; P.boostFuel=Math.max(0,P.boostFuel-.65*dt); }
  else { P.boost=false; P.boostFuel=Math.min(100,P.boostFuel+.2*dt); }

  // Track curvature for grip
  const ti = trackAt(P.s);
  const segIdx = Math.floor(P.s/TLEN*TRACK.length);
  const si2 = Math.floor((P.s+TW*2)/TLEN*TRACK.length) % TRACK.length;
  let curvAng = TRACK[si2].ang - ti.ang;
  if(curvAng> Math.PI) curvAng-=Math.PI*2;
  if(curvAng<-Math.PI) curvAng+=Math.PI*2;
  const grip = Math.max(.42, 1 - Math.abs(curvAng)*2.2*(1+P.dmg/90));

  let topS = P.maxSpd*grip;
  if(P.drs)   topS *= 1.09;
  if(P.boost) topS *= 1.22;

  // Accel
  if(gas())        P.spd = Math.min(topS, P.spd + .21*dt*(1-P.dmg/200));
  else if(brake()) P.spd = Math.max(0, P.spd - .38*dt);
  else             P.spd = Math.max(0, P.spd - .01*P.spd*dt);

  // Steer
  const sr = P.spd / P.maxSpd;
  const steerF = .026*(0.4 + 0.6*(1-sr));
  if(left())  P.lo = Math.max(-1.1, P.lo - steerF*dt);
  if(right()) P.lo = Math.min( 1.1, P.lo + steerF*dt);
  P.lo *= Math.pow(.965, dt);
  P.steer += ((left()?-.5:right()?.5:0)*sr*0.5 - P.steer) * .18*dt;

  // Move along track
  P.prevS = P.s;
  P.s = (P.s + P.spd*dt) % TLEN;

  // World pos
  const nti = trackAt(P.s);
  P.x = nti.x + nti.lx * P.lo * TW;
  P.y = nti.y + nti.ly * P.lo * TW;
  let da = nti.ang - P.ang;
  if(da> Math.PI) da-=Math.PI*2;
  if(da<-Math.PI) da+=Math.PI*2;
  P.ang += da*.16*dt;

  // Off-track
  if(Math.abs(P.lo) > .88){
    P.dmg = Math.min(100, P.dmg + .2*dt); P.spd *= .96;
    const sp = w2s(P.x,P.y); smoke(sp.sx,sp.sy);
  }

  // Lap
  if(P.prevS > TLEN*.96 && P.s < TLEN*.04){
    if(P.lapMs > 0){
      const lt = performance.now()-P.lapMs;
      P.lapTimes.push(lt);
      if(lt<P.bestLap){ P.bestLap=lt; notify(`BEST LAP  ${fmt(lt)}`,'g'); }
      else notify(`LAP ${P.lap}  ${fmt(lt)}`,'y');
      P.score += Math.max(50, Math.round(5000000/lt));
    }
    P.lapMs=performance.now(); P.lap++;
    P.drsAvail=true; g('ida').className='ind ion-g';
    if(P.lap>LAPS){ P.finished=true; endRace('fin'); return; }
  }

  // DRS off in corners
  if(P.drs && Math.abs(curvAng) > .06){ P.drs=false; g('id').className='ind ioff'; }

  // AI
  AI.forEach(ai => {
    const ati = trackAt(ai.s);
    const asi = Math.floor(ai.s/TLEN*TRACK.length);
    const asi2 = Math.floor((ai.s+TW*2)/TLEN*TRACK.length)%TRACK.length;
    let ac = TRACK[asi2].ang - TRACK[asi].ang;
    if(ac> Math.PI)ac-=Math.PI*2; if(ac<-Math.PI)ac+=Math.PI*2;
    const ag = Math.max(.45, 1-Math.abs(ac)*2.5);
    ai.spd = Math.min(ai.maxSpd*ag, ai.spd + .19*dt);
    ai.prevS = ai.s;
    ai.s = (ai.s + ai.spd*dt) % TLEN;
    ai.wb += dt*.045;
    ai.lo = Math.sin(ai.wb)*0.32 + Math.sin(ai.wb*.37)*.14;
    ai.lo = Math.max(-.9, Math.min(.9, ai.lo));
    const nai = trackAt(ai.s);
    ai.x = nai.x + nai.lx*ai.lo*TW; ai.y = nai.y + nai.ly*ai.lo*TW;
    let da2=nai.ang-ai.ang; if(da2>Math.PI)da2-=Math.PI*2; if(da2<-Math.PI)da2+=Math.PI*2;
    ai.ang=(ai.ang||0)+da2*.16*dt;
    if(ai.prevS>TLEN*.96&&ai.s<TLEN*.04) ai.lap=(ai.lap||1)+1;
  });

  // Collision
  if(P.cooldown>0) P.cooldown-=dt;
  AI.forEach(ai=>{
    const dist=Math.hypot(P.x-ai.x, P.y-ai.y);
    if(dist<34&&P.cooldown<=0){
      P.dmg=Math.min(100,P.dmg+1.6*dt); P.spd*=.84; ai.spd*=.86;
      const sp=w2s(P.x,P.y); bang(sp.sx,sp.sy); notify('CONTACT!','r'); P.cooldown=90;
    } else if(dist<52&&P.cooldown<=0){
      P.overtakes++; P.score+=200; notify('OVERTAKE  +200','g'); P.cooldown=110;
    }
  });

  // Exhaust
  if(P.spd>P.maxSpd*.22&&Math.random()<.5){
    const sp=w2s(P.x-Math.cos(P.ang)*20, P.y-Math.sin(P.ang)*20);
    exh(sp.sx,sp.sy,P.ang);
  }

  // Retire
  if(P.dmg>=100){ const sp=w2s(P.x,P.y); bang(sp.sx,sp.sy); endRace('ret'); return; }

  updateCam(P.x,P.y,P.ang,dt);

  const srpm = P.spd/P.maxSpd;
  P.gear = Math.min(8,Math.max(1,Math.ceil(srpm*8)|0));
  P.rpm  = srpm;
  tickPts(dt);
  updateHUD(srpm);
}

function tickPts(dt){
  PTS=PTS.filter(p=>{ p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=Math.pow(.88,dt);p.vy*=Math.pow(.88,dt);p.life-=dt; return p.life>0; });
}

function updateHUD(sr){
  const pos=getPos(), lt=P.lapMs>0?performance.now()-P.lapMs:0;
  g('hp').textContent=`P${pos}`;
  g('hl').textContent=`${Math.min(P.lap,LAPS)}/${LAPS}`;
  g('hlt').textContent=fmt(lt);
  g('hbl').textContent=P.bestLap===Infinity?'-:--.---':fmt(P.bestLap);
  g('hsc').textContent=P.score.toLocaleString();
  g('hsp').textContent=Math.round(sr*360)|0;
  g('gd').textContent=P.spd<.05?'N':P.gear;
  g('rf').style.width=(P.rpm*100)+'%';
  g('bf2').style.width=P.boostFuel+'%';
  g('hf').style.width=(100-P.dmg)+'%';
  g('ib').className='ind '+(P.boost?'ion-o':'ioff');
  g('id').className='ind '+(P.drs?'ion-g':'ioff');
  const de=g('dlt');
  if(P.bestLap!==Infinity&&lt>0){ const d=lt-P.bestLap; de.textContent=(d>=0?'+':'')+fmt(Math.abs(d)); de.className=d>=0?'dr':'dg'; }
}

    r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);

    this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r);
    this.closePath();
    return this;
  };
}

//   DRAW
// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r);
    this.closePath();
    return this;
  };
}

// ═══════════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawTrack();

  // Sort objects by screen Y (painter's algorithm)
  const objs=[...AI.map(a=>({type:'ai',d:a,sy:w2s(a.x,a.y).sy})),{type:'player',sy:w2s(P.x,P.y).sy}];
  objs.sort((a,b)=>a.sy-b.sy);
  objs.forEach(o=>o.type==='ai'?drawAI(o.d):drawPlayer());

  drawPts();
  drawBlur();
  drawSpeedo();
  drawMM();
}

// ── Background ──
function drawBg(){
  const t=Date.now()*.001;
  const sg=ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#000008'); sg.addColorStop(.55,'#04001a'); sg.addColorStop(1,'#08002a');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  // Stars
  STARS.forEach(s=>{
    ctx.globalAlpha=s.a*(.35+.6*(Math.sin(t*s.fr+s.fl)*.5+.5));
    ctx.fillStyle='#fff';
    ctx.fillRect(((s.x*1.8+W/2)%W+W)%W, ((s.y*1.8+H/2)%H+H)%H, s.r,s.r);
  });
  ctx.globalAlpha=1;

  // City skyline
  if(!CITY) buildCity();
  const sh=H*.36;
  CITY.forEach(b=>{
    ctx.fillStyle=b.col;
    ctx.fillRect(b.x,sh-b.h,b.w,b.h);
    b.wins.forEach(w=>{
      ctx.globalAlpha=.08+.5*((.5+.5*Math.sin(t*w.fr+w.ph)));
      ctx.fillStyle=w.col;
      ctx.fillRect(b.x+w.ox*b.w,sh-b.h+w.oy*b.h,2.5,1.8);
    });
    ctx.globalAlpha=1;
  });

  // Horizon glow
  const hg=ctx.createLinearGradient(0,sh-12,0,sh+12);
  hg.addColorStop(0,'rgba(0,255,150,0)');
  hg.addColorStop(.5,`rgba(0,255,150,${.1+.06*Math.sin(t*.8)})`);
  hg.addColorStop(1,'rgba(0,255,150,0)');
  ctx.fillStyle=hg; ctx.fillRect(0,sh-12,W,24);
}

// ── TRACK DRAWING — the main fix! ──
function drawTrack(){
  ctx.save();
  const N = TRACK.length;

  // ── 1. Grass / terrain (wide band outside track) ──
  ctx.beginPath();
  trackPolyL.forEach((p,i)=>{ const s=w2s(p.x,p.y); i===0?ctx.moveTo(s.sx,s.sy):ctx.lineTo(s.sx,s.sy); });
  trackPolyR.slice().reverse().forEach(p=>{ const s=w2s(p.x,p.y); ctx.lineTo(s.sx,s.sy); });
  ctx.closePath();
  ctx.fillStyle='#0d1f0d'; ctx.fill();

  // ── 2. Road asphalt ──
  ctx.beginPath();
  trackPolyL.forEach((p,i)=>{ const s=w2s(p.x,p.y); i===0?ctx.moveTo(s.sx,s.sy):ctx.lineTo(s.sx,s.sy); });
  trackPolyR.slice().reverse().forEach(p=>{ const s=w2s(p.x,p.y); ctx.lineTo(s.sx,s.sy); });
  ctx.closePath();
  ctx.fillStyle='#1a1a2e'; ctx.fill();

  // ── 3. Road texture bands (alternating) ──
  for(let i=0;i<N;i+=6){
    const t0=TRACK[i], t1=TRACK[(i+3)%N];
    const OFF=TW*.92;
    const p0=w2s(t0.x+t0.lx*OFF, t0.y+t0.ly*OFF);
    const p1=w2s(t0.x-t0.lx*OFF, t0.y-t0.ly*OFF);
    const p2=w2s(t1.x-t1.lx*OFF, t1.y-t1.ly*OFF);
    const p3=w2s(t1.x+t1.lx*OFF, t1.y+t1.ly*OFF);
    ctx.beginPath();
    ctx.moveTo(p0.sx,p0.sy); ctx.lineTo(p1.sx,p1.sy);
    ctx.lineTo(p2.sx,p2.sy); ctx.lineTo(p3.sx,p3.sy);
    ctx.closePath();
    ctx.fillStyle=(i/6)%2===0?'#1c1c30':'#18182a'; ctx.fill();
  }

  // ── 4. Kerbs ──
  for(let i=0;i<N;i+=4){
    const t0=TRACK[i], t1=TRACK[(i+2)%N];
    const kc = (i/4)%2===0?'#cc1100':'#f0f0f0';
    const KI=TW*.9, KO=TW*1.06;
    // Left kerb
    const a=w2s(t0.x+t0.lx*KI,t0.y+t0.ly*KI);
    const b=w2s(t0.x+t0.lx*KO,t0.y+t0.ly*KO);
    const c_=w2s(t1.x+t1.lx*KO,t1.y+t1.ly*KO);
    const d=w2s(t1.x+t1.lx*KI,t1.y+t1.ly*KI);
    ctx.beginPath(); ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.lineTo(c_.sx,c_.sy);ctx.lineTo(d.sx,d.sy);ctx.closePath();
    ctx.fillStyle=kc; ctx.fill();
    // Right kerb
    const e=w2s(t0.x-t0.lx*KI,t0.y-t0.ly*KI);
    const f_=w2s(t0.x-t0.lx*KO,t0.y-t0.ly*KO);
    const gg=w2s(t1.x-t1.lx*KO,t1.y-t1.ly*KO);
    const h=w2s(t1.x-t1.lx*KI,t1.y-t1.ly*KI);
    ctx.beginPath(); ctx.moveTo(e.sx,e.sy);ctx.lineTo(f_.sx,f_.sy);ctx.lineTo(gg.sx,gg.sy);ctx.lineTo(h.sx,h.sy);ctx.closePath();
    ctx.fillStyle=kc; ctx.fill();
  }

  // ── 5. Tyre barriers (outer wall) ──
  ctx.beginPath();
  trackPolyL.forEach((p,i)=>{ const s=w2s(p.x,p.y); i===0?ctx.moveTo(s.sx,s.sy):ctx.lineTo(s.sx,s.sy); });
  ctx.closePath(); ctx.strokeStyle='#3a3a5a'; ctx.lineWidth=4; ctx.stroke();

  ctx.beginPath();
  trackPolyR.forEach((p,i)=>{ const s=w2s(p.x,p.y); i===0?ctx.moveTo(s.sx,s.sy):ctx.lineTo(s.sx,s.sy); });
  ctx.closePath(); ctx.strokeStyle='#3a3a5a'; ctx.lineWidth=4; ctx.stroke();

  // ── 6. Neon edge glow ──
  ctx.shadowBlur=10;
  ctx.beginPath();
  trackPolyL.forEach((p,i)=>{ const s=w2s(p.x,p.y); i===0?ctx.moveTo(s.sx,s.sy):ctx.lineTo(s.sx,s.sy); });
  ctx.closePath(); ctx.strokeStyle='rgba(0,255,150,.6)'; ctx.lineWidth=2; ctx.shadowColor='#00ff96'; ctx.stroke();

  ctx.beginPath();
  trackPolyR.forEach((p,i)=>{ const s=w2s(p.x,p.y); i===0?ctx.moveTo(s.sx,s.sy):ctx.lineTo(s.sx,s.sy); });
  ctx.closePath(); ctx.strokeStyle='rgba(255,44,200,.5)'; ctx.shadowColor='#ff22cc'; ctx.stroke();
  ctx.shadowBlur=0;

  // ── 7. Center line dashes ──
  for(let i=0;i<N;i+=14){
    const t0=TRACK[i], t1=TRACK[(i+7)%N];
    const a=w2s(t0.x,t0.y), b=w2s(t1.x,t1.y);
    ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy);
    ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=2; ctx.stroke();
  }

  // ── 8. Start / Finish line ──
  const sf=TRACK[0];
  const A=w2s(sf.x+sf.lx*TW*.95, sf.y+sf.ly*TW*.95);
  const B=w2s(sf.x-sf.lx*TW*.95, sf.y-sf.ly*TW*.95);
  for(let k=0;k<8;k++){
    const f=k/8, f2=(k+1)/8;
    const p0=w2s(sf.x+sf.lx*(TW*.95-TW*1.9*f),  sf.y+sf.ly*(TW*.95-TW*1.9*f));
    const p1=w2s(sf.x+sf.lx*(TW*.95-TW*1.9*f2), sf.y+sf.ly*(TW*.95-TW*1.9*f2));
    const p2=w2s(sf.x+sf.lx*(TW*.95-TW*1.9*f2)+sf.nx*16, sf.y+sf.ly*(TW*.95-TW*1.9*f2)+sf.ny*16);
    const p3=w2s(sf.x+sf.lx*(TW*.95-TW*1.9*f)+sf.nx*16,  sf.y+sf.ly*(TW*.95-TW*1.9*f)+sf.ny*16);
    ctx.beginPath(); ctx.moveTo(p0.sx,p0.sy);ctx.lineTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.lineTo(p3.sx,p3.sy);ctx.closePath();
    ctx.fillStyle=k%2===0?'#fff':'#000'; ctx.fill();
  }
  ctx.shadowBlur=8; ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.shadowColor='#fff';
  ctx.beginPath(); ctx.moveTo(A.sx,A.sy); ctx.lineTo(B.sx,B.sy); ctx.stroke();
  ctx.shadowBlur=0;

  ctx.restore();
}

// ── F1 Car ──
function drawCar(wx,wy,ang,col,isPlayer,steer){
  const sp=w2s(wx,wy);
  const dxC=wx-CAM.x, dyC=wy-CAM.y;
  const dist=Math.hypot(dxC,dyC);
  const psc=Math.max(.5,Math.min(1.7,550/(dist+160)));
  const scale=CAM.zoom*psc*(isPlayer?1.1:1);
  const relAng=ang-CAM.ang;

  ctx.save();
  ctx.translate(sp.sx,sp.sy);
  ctx.rotate(relAng);
  ctx.scale(scale, scale*.68);

  const CL=46, CW=10;

  // Shadow
  ctx.globalAlpha=.4; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0,7,CL*.88,CW*.85,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // Underglow
  const ug=ctx.createRadialGradient(0,0,0,0,0,CL*.9);
  ug.addColorStop(0,isPlayer?'rgba(0,255,150,.3)':col.replace(')',',0.2)').replace('rgb','rgba'));
  ug.addColorStop(1,'transparent');
  ctx.globalAlpha=.6; ctx.fillStyle=ug; ctx.fillRect(-CL,-CW*1.6,CL*2,CW*3.2); ctx.globalAlpha=1;

  // Boost flame
  if(isPlayer&&P.boost){
    const fl=20+Math.random()*16;
    const fg=ctx.createLinearGradient(-CL,0,-CL-fl,0);
    fg.addColorStop(0,'rgba(255,255,180,.95)'); fg.addColorStop(.3,'rgba(255,160,0,.85)'); fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.ellipse(-CL-fl*.42,0,fl,CW*.58,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath(); ctx.ellipse(-CL-fl*.18,0,fl*.15,CW*.25,0,0,Math.PI*2); ctx.fill();
  }

  // Normal exhaust glow
  if(!isPlayer||!P.boost){
    const el_=8+((isPlayer?P.spd:3)/P.maxSpd)*14;
    const eg=ctx.createLinearGradient(-CL,0,-CL-el_,0);
    eg.addColorStop(0,'rgba(255,110,0,.7)'); eg.addColorStop(1,'transparent');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.ellipse(-CL-el_*.38,0,el_,CW*.2,0,0,Math.PI*2); ctx.fill();
  }

  // Rear wing
  const rwCol=isPlayer?'#007755':'#333';
  ctx.fillStyle=rwCol; ctx.fillRect(-CL*.87,-CW*1.15,CL*.22,CW*2.3);
  ctx.fillStyle=isPlayer?'#00eeaa':lightCol(col);
  ctx.fillRect(-CL*.87,-CW*1.15,CL*.22,CW*.3);
  ctx.fillRect(-CL*.87,CW*.85, CL*.22,CW*.3);

  // Sidepods
  const spCol=isPlayer?'#006644':darkCol(col);
  ctx.fillStyle=spCol;
  ctx.beginPath(); ctx.roundRect(-CL*.45,-CW*1.04,CL*.68,CW*.52,4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(-CL*.45,CW*.52, CL*.68,CW*.52,4); ctx.fill();

  // Body
  const bg=ctx.createLinearGradient(-CL*.72,-CW,CL*.9,0);
  if(isPlayer){ bg.addColorStop(0,'#00ffcc'); bg.addColorStop(.3,'#00ccaa'); bg.addColorStop(1,'#004433'); }
  else { bg.addColorStop(0,lightCol(col)); bg.addColorStop(.4,col); bg.addColorStop(1,darkCol(col)); }
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.moveTo(-CL*.82,-CW*.82);
  ctx.bezierCurveTo(-CL*.4,-CW*.88,CL*.3,-CW*.9,CL*.92,-CW*.12);
  ctx.lineTo(CL*.92,CW*.12);
  ctx.bezierCurveTo(CL*.3,CW*.9,-CL*.4,CW*.88,-CL*.82,CW*.82);
  ctx.closePath(); ctx.fill();

  // Livery lines
  ctx.strokeStyle=isPlayer?'rgba(0,255,150,.55)':'rgba(255,255,255,.2)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-CL*.58,-CW*.48); ctx.lineTo(CL*.48,-CW*.28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-CL*.58, CW*.48); ctx.lineTo(CL*.48, CW*.28); ctx.stroke();

  // Halo
  ctx.fillStyle='#002828'; ctx.strokeStyle=isPlayer?'#00ff96':'rgba(255,255,255,.3)'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.roundRect(-CL*.09,-CW*.6,CL*.18,CW*.24,5); ctx.fill(); ctx.stroke();

  // Cockpit
  ctx.fillStyle='#004444';
  ctx.beginPath(); ctx.roundRect(-CL*.19,-CW*.44,CL*.38,CW*.3,7); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.88)';
  ctx.beginPath(); ctx.roundRect(-CL*.16,-CW*.4,CL*.32,CW*.24,6); ctx.fill();

  // Helmet
  ctx.fillStyle=isPlayer?'#00ddcc':lightCol(col);
  ctx.beginPath(); ctx.ellipse(CL*.03,-CW*.4,CL*.12,CW*.22,0,0,Math.PI*2); ctx.fill();
  const va=isPlayer?(.6+.3*Math.sin(Date.now()*.007)):.25;
  ctx.fillStyle=isPlayer?`rgba(0,255,150,${va})`:'rgba(200,220,255,.2)';
  ctx.beginPath(); ctx.ellipse(CL*.04,-CW*.36,CL*.07,CW*.12,0,0,Math.PI*2); ctx.fill();

  // Nose
  ctx.fillStyle=isPlayer?'#007766':'#2a2a2a';
  ctx.beginPath(); ctx.moveTo(CL*.88,-CW*.22); ctx.lineTo(CL*1.02,0); ctx.lineTo(CL*.88,CW*.22); ctx.closePath(); ctx.fill();

  // Front wing
  ctx.fillStyle=isPlayer?'#009977':'#333';
  ctx.fillRect(CL*.55,-CW*1.15,CL*.36,CW*.26);
  ctx.fillRect(CL*.55, CW*.89, CL*.36,CW*.26);
  ctx.fillRect(CL*.55,-CW*.98, CL*.36,CW*1.96);

  // Car number
  if(isPlayer){
    ctx.fillStyle='rgba(255,255,255,.88)'; ctx.font=`bold ${CW*.88}px Courier New`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#00ff96'; ctx.shadowBlur=5;
    ctx.fillText('44',-CL*.16,0); ctx.shadowBlur=0;
  }

  // Wheels (4 corners)
  const wt=Date.now()*.03*(isPlayer?P.spd/P.maxSpd:.5);
  const fsteer=isPlayer?steer:0;
  [[-CL*.36,CW*.88,0],[-CL*.36,-CW*.88,0],[CL*.36,CW*.88,fsteer],[CL*.36,-CW*.88,fsteer]].forEach(([wx2,wy2,wst])=>{
    ctx.save(); ctx.translate(wx2,wy2); ctx.rotate(wst);
    ctx.fillStyle='#111'; ctx.strokeStyle=isPlayer?'#00ff96':col; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(0,0,CW*.6,CW*.28,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.save(); ctx.rotate(wst===0?wt:wt*Math.cos(wst));
    ctx.strokeStyle=isPlayer?'rgba(0,255,150,.45)':lightCol(col); ctx.lineWidth=1;
    for(let i=0;i<5;i++){ const a=i*Math.PI*2/5; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*CW*.2,Math.sin(a)*CW*.2); ctx.stroke(); }
    ctx.restore();
    ctx.fillStyle=isPlayer?'#00ff96':col; ctx.beginPath(); ctx.arc(0,0,CW*.07,0,Math.PI*2); ctx.fill();
    // Brake heat
    if(isPlayer&&brake()&&P.spd>.25*P.maxSpd){ ctx.fillStyle='rgba(255,80,0,.3)'; ctx.beginPath(); ctx.arc(0,0,CW*.17,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });

  // Neon underglow strip
  if(isPlayer){
    const ua=.22+.16*Math.sin(Date.now()*.008);
    ctx.shadowColor='#00ff96'; ctx.shadowBlur=18;
    ctx.strokeStyle=`rgba(0,255,150,${ua})`; ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.moveTo(-CL*.82,-CW*.75); ctx.lineTo(CL*.45,-CW*.75); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-CL*.82, CW*.75); ctx.lineTo(CL*.45, CW*.75); ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

function lightCol(hex){ try{ const r=Math.min(255,parseInt(hex.slice(1,3),16)+60),gg=Math.min(255,parseInt(hex.slice(3,5),16)+60),b=Math.min(255,parseInt(hex.slice(5,7),16)+60); return `rgb(${r},${gg},${b})`; }catch(e){ return '#fff'; } }
function darkCol(hex){ try{ const r=Math.max(0,parseInt(hex.slice(1,3),16)-60),gg=Math.max(0,parseInt(hex.slice(3,5),16)-60),b=Math.max(0,parseInt(hex.slice(5,7),16)-60); return `rgb(${r},${gg},${b})`; }catch(e){ return '#000'; } }

function drawAI(ai){ drawCar(ai.x,ai.y,ai.ang,ai.color,false,0); }
function drawPlayer(){ drawCar(P.x,P.y,P.ang,'#00ff96',true,P.steer); }

function drawPts(){
  PTS.forEach(p=>{
    ctx.globalAlpha=p.life/p.ml;
    if(p.glow){ ctx.shadowColor=p.col; ctx.shadowBlur=8; }
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
    if(p.glow) ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;
}

function drawBlur(){
  const sr=P.spd/P.maxSpd; if(sr<.28) return;
  const a=(sr-.28)/.72*.32;
  const col=P.boost?'rgba(255,120,0,':'rgba(0,255,150,';
  for(let i=0;i<10;i++){
    const y=H*.2+Math.random()*H*.6, len=40+Math.random()*140;
    ctx.globalAlpha=a*(.15+Math.random()*.85);
    ctx.strokeStyle=col+(0.2+Math.random()*.5)+')'; ctx.lineWidth=.5+Math.random()*1.8;
    ctx.beginPath(); ctx.moveTo(Math.random()*W*.14,y); ctx.lineTo(Math.random()*W*.14+len,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W-Math.random()*W*.14,y); ctx.lineTo(W-Math.random()*W*.14-len,y); ctx.stroke();
  }
  ctx.globalAlpha=1;
  if(P.boost){
    const vg=ctx.createRadialGradient(W/2,H/2,H*.1,W/2,H/2,H*.8);
    vg.addColorStop(0,'transparent'); vg.addColorStop(1,`rgba(255,80,0,${a*.45})`);
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }
}

function drawSpeedo(){
  sctx.clearRect(0,0,108,108);
  const cx=54,cy=58,r=38;
  sctx.beginPath(); sctx.arc(cx,cy,r,Math.PI*.65,Math.PI*2.35);
  sctx.strokeStyle='rgba(0,255,150,.1)'; sctx.lineWidth=7; sctx.stroke();
  const sr=Math.min(P.spd/P.maxSpd,1);
  const sg=sctx.createLinearGradient(cx-r,cy,cx+r,cy);
  sg.addColorStop(0,'#00ff96'); sg.addColorStop(.6,'#ffcc00'); sg.addColorStop(1,'#ff2244');
  sctx.beginPath(); sctx.arc(cx,cy,r,Math.PI*.65,Math.PI*.65+sr*Math.PI*1.7);
  sctx.strokeStyle=sg; sctx.lineWidth=7; sctx.stroke();
  const na=Math.PI*.65+sr*Math.PI*1.7;
  sctx.save(); sctx.translate(cx,cy); sctx.rotate(na);
  sctx.strokeStyle='#ff2244'; sctx.lineWidth=2.5; sctx.shadowColor='#ff2244'; sctx.shadowBlur=5;
  sctx.beginPath(); sctx.moveTo(0,0); sctx.lineTo(r-4,0); sctx.stroke();
  sctx.restore();
  sctx.fillStyle='#ff2244'; sctx.beginPath(); sctx.arc(cx,cy,4,0,Math.PI*2); sctx.fill();
  sctx.fillStyle='#00ff96'; sctx.font='bold 18px Courier New'; sctx.textAlign='center';
  sctx.shadowColor='#00ff96'; sctx.shadowBlur=8;
  sctx.fillText(Math.round(sr*360)|0, cx, cy-5);
  sctx.font='7px Courier New'; sctx.fillStyle='rgba(0,255,150,.38)'; sctx.shadowBlur=0;
  sctx.fillText('KM/H',cx,cy+7);
}

function drawMM(){
  mctx.clearRect(0,0,128,128);
  mctx.fillStyle='rgba(0,0,16,.9)';
  mctx.beginPath(); mctx.arc(64,64,62,0,Math.PI*2); mctx.fill();

  // Track bounds for scaling
  let mnx=Infinity,mxx=-Infinity,mny=Infinity,mxy=-Infinity;
  TRACK.forEach(t=>{ mnx=Math.min(mnx,t.x);mxx=Math.max(mxx,t.x);mny=Math.min(mny,t.y);mxy=Math.max(mxy,t.y); });
  const mw=mxx-mnx||1, mh=mxy-mny||1, pad=12;
  const ms=Math.min((128-pad*2)/mw,(128-pad*2)/mh);
  const mox=64-(mnx+mw/2)*ms, moy=64-(mny+mh/2)*ms;
  const mp=p=>({x:p.x*ms+mox,y:p.y*ms+moy});

  // Draw track width on minimap
  const kStep=Math.ceil(TRACK.length/80);
  for(let i=0;i<TRACK.length;i+=kStep){
    const t0=TRACK[i], t1=TRACK[(i+kStep)%TRACK.length];
    const TW_MM=TW*ms;
    const a=mp({x:t0.x+t0.lx*TW,y:t0.y+t0.ly*TW});
    const b=mp({x:t0.x-t0.lx*TW,y:t0.y-t0.ly*TW});
    const c_=mp({x:t1.x-t1.lx*TW,y:t1.y-t1.ly*TW});
    const d=mp({x:t1.x+t1.lx*TW,y:t1.y+t1.ly*TW});
    mctx.beginPath(); mctx.moveTo(a.x,a.y);mctx.lineTo(b.x,b.y);mctx.lineTo(c_.x,c_.y);mctx.lineTo(d.x,d.y);mctx.closePath();
    mctx.fillStyle='#1a1a2e'; mctx.fill();
  }

  // Centerline
  mctx.beginPath();
  TRACK.forEach((t,i)=>{ const p=mp(t); i===0?mctx.moveTo(p.x,p.y):mctx.lineTo(p.x,p.y); });
  mctx.closePath(); mctx.strokeStyle='rgba(0,255,150,.35)'; mctx.lineWidth=1.5; mctx.stroke();

  // AI dots
  AI.forEach(ai=>{ const tp=trackAt(ai.s),p=mp(tp); mctx.beginPath(); mctx.arc(p.x,p.y,2.5,0,Math.PI*2); mctx.fillStyle=ai.color; mctx.fill(); });

  // Player dot
  const pp=trackAt(P.s), pp2=mp(pp);
  mctx.beginPath(); mctx.arc(pp2.x,pp2.y,4.5,0,Math.PI*2);
  mctx.fillStyle='#fff'; mctx.shadowColor='#00ff96'; mctx.shadowBlur=10; mctx.fill(); mctx.shadowBlur=0;

  // Border
  mctx.beginPath(); mctx.arc(64,64,62,0,Math.PI*2);
  mctx.strokeStyle='rgba(0,255,150,.22)'; mctx.lineWidth=1.5; mctx.stroke();
}

// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r);
    this.closePath();
    return this;
  };
}
